name: Expo Mobile Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Install and Build Expo App
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code onto the GitHub server
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Setup Expo and EAS CLI
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      # 4. Install dependencies (legacy-peer-deps to avoid version conflicts)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Decode Google Services Configuration
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_SECRET" | base64 --decode > android/app/google-services.json
     
        # 5. Build Android APK locally
      - name: Build Android Preview
        run: eas build --platform android --profile preview --local --non-interactive --output ./build/app.apk

      # 6. Upload APK so you can download it from GitHub Actions
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-preview
          path: ./build/app.apk
          retention-days: 7